<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>AI Pharmacy Assistant</title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Bootstrap Icons -->

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <!-- Google Font -->

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <!-- CSS -->

    <link
        rel="stylesheet"
        href="/static/styles.css"
    >

</head>

<body>

<div class="app-container">

    <!-- ================= HEADER ================= -->

    <header class="topbar">

        <div class="brand">

            <div class="logo">

                <i class="bi bi-capsule-pill"></i>

            </div>

            <div>

                <h3>AI Pharmacy Assistant</h3>

                <span>
                    Voice & Text Powered Pharmacy Agent
                </span>

            </div>

        </div>

        <div class="status-wrapper">

            <div class="session-badge me-2" id="sessionBadge" style="cursor: pointer;" title="Click to change Session ID">
                <i class="bi bi-person-fill"></i>
                <span id="sessionNameText">Default</span>
            </div>

            <button id="logoutBtn" class="btn btn-outline-danger btn-sm me-3" style="border-radius: 50px; display: flex; align-items: center; gap: 5px; font-weight: 600; padding: 8px 16px;" title="Logout and switch user">
                <i class="bi bi-box-arrow-right"></i>
                Logout
            </button>


            <div
                class="status-badge disconnected"
                id="connectionStatus"
            >

                <span class="dot" style="background-color: var(--danger)"></span>

                Disconnected

            </div>

        </div>

    </header>

    <!-- ================= CHAT ================= -->

    <main
        id="chatContainer"
        class="chat-container"
    >

    </main>

    <!-- ================= THINKING ================= -->

    <div
        class="thinking"
        id="thinkingIndicator"
    >

        <div class="avatar assistant-avatar">

            <i class="bi bi-robot"></i>

        </div>

        <div class="thinking-box">

            <span></span>

            <span></span>

            <span></span>

        </div>

    </div>

    <!-- ================= SUGGESTIONS ================= -->

    <div class="suggestions-container" id="suggestionsContainer">

        <div class="suggestion-chip" data-msg="Check stock of Paracetamol">💊 Check Paracetamol Stock</div>

        <div class="suggestion-chip" data-msg="Reserve 5 units of Ibuprofen for phone 1234567890">📦 Reserve Ibuprofen</div>

        <div class="suggestion-chip" data-msg="What are the pharmacy opening hours?">🕒 Opening Hours</div>

        <div class="suggestion-chip" data-msg="Search for Amoxicillin">🔍 Search Amoxicillin</div>

    </div>

    <!-- ================= TEXT INPUT ================= -->

    <div class="text-input-panel">

        <button id="clearBtnMobile" class="action-circle-btn mobile-only-btn" title="Clear Chat">
            <i class="bi bi-trash"></i>
        </button>

        <input type="text" id="textInput" class="chat-input" placeholder="Type a message here..." autocomplete="off">

        <button id="micBtnMobile" class="action-circle-btn mobile-only-btn" title="Start Listening">
            <i class="bi bi-mic-fill"></i>
        </button>

        <button id="sendBtn" class="send-btn">

            <i class="bi bi-send-fill"></i>

        </button>

    </div>

    <!-- ================= VOICE ================= -->

    <section class="voice-panel">

        <div class="voice-status">

            <div>

                <strong id="voiceStatus">

                    Ready

                </strong>

            </div>

            <div
                class="wave"
                id="waveform"
                style="opacity: 0.3;"
            >

                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>

            </div>

        </div>

    </section>

    <!-- ================= CONTROLS ================= -->

    <footer class="controls">

        <button
            id="startBtn"
            class="btn btn-primary control-btn"
        >

            <i class="bi bi-mic-fill"></i>

            Start Listening

        </button>

        <button
            id="stopBtn"
            class="btn btn-danger control-btn"
            disabled
        >

            <i class="bi bi-stop-fill"></i>

            Stop

        </button>

        <button
            id="clearBtn"
            class="btn btn-outline-secondary control-btn"
        >

            <i class="bi bi-trash"></i>

            Clear Chat

        </button>

    </footer>

</div>

<audio
    id="audioPlayer"
    autoplay
></audio>

<!-- ================= SESSION MODAL ================= -->
<div id="sessionModal" class="modal-overlay">
    <div class="session-modal-card">
        <div class="logo mb-3 mx-auto">
            <i class="bi bi-person-badge"></i>
        </div>
        <h4>Enter Session ID</h4>
        <p class="text-muted">Enter your name or session identifier to load your chat history and memory.</p>
        <input type="text" id="sessionInput" class="form-control chat-input text-center mb-3" placeholder="e.g., Mihir, User123" required>
        <button id="sessionSubmitBtn" class="btn btn-primary control-btn w-100">
            Start Session
        </button>
    </div>
</div>

<script src="/static/script.js?v=4"></script>




</body>

</html>
