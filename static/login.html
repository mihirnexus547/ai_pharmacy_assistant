<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - PharmAssist</title>
    
    <!-- Bootstrap Icons & Google Fonts -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #090e1a;
            --card-bg: rgba(17, 24, 39, 0.75);
            --border-glow: rgba(99, 102, 241, 0.2);
            --primary: #3b82f6;
            --secondary: #6366f1;
            --text-light: #f3f4f6;
            --text-muted: #9ca3af;
            --danger: #ef4444;
            --radius-lg: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* --- Glowing Background Blobs --- */
        .glowing-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.35;
            pointer-events: none;
        }
        .blob-1 {
            top: 20%;
            left: 20%;
            width: 30vw;
            height: 30vw;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.4) 0%, transparent 70%);
        }
        .blob-2 {
            bottom: 20%;
            right: 20%;
            width: 35vw;
            height: 35vw;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.4) 0%, transparent 70%);
        }

        /* --- Login Card --- */
        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            border: 1px solid var(--border-glow);
            border-radius: var(--radius-lg);
            padding: 40px;
            backdrop-filter: blur(16px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: cardFadeIn 0.5s ease-out;
        }

        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- Branding --- */
        .brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-light);
            margin-bottom: 30px;
        }
        .brand i {
            font-size: 32px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .brand span {
            font-family: 'Outfit', sans-serif;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .login-title {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .login-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 28px;
        }

        /* --- Form Elements --- */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            padding-left: 4px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background: rgba(9, 14, 26, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: var(--text-light);
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
            background: rgba(9, 14, 26, 0.8);
        }

        /* --- Alert --- */
        .alert-danger {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: left;
            align-items: center;
            gap: 10px;
        }

        /* --- Button --- */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(99, 102, 241, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--text-light);
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 24px 20px;
                border-radius: 16px;
                width: calc(100% - 30px);
                margin: 0 auto;
            }
            .brand span {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <div class="glowing-blob blob-1"></div>
    <div class="glowing-blob blob-2"></div>

    <div class="login-card">
        <!-- Brand -->
        <a href="/" class="brand">
            <i class="bi bi-capsule-pill"></i>
            <span>PharmAssist</span>
        </a>

        <h2 class="login-title">Admin Access</h2>
        <p class="login-subtitle">Please sign in to manage pharmacy data</p>

        <!-- Error Notification -->
        <div class="alert-danger" id="errorMsg">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span id="errorText">Invalid username or password.</span>
        </div>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <div class="input-wrapper">
                    <i class="bi bi-person-fill"></i>
                    <input class="form-input" type="text" id="username" placeholder="Enter admin username" required autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div class="input-wrapper">
                    <i class="bi bi-shield-lock-fill"></i>
                    <input class="form-input" type="password" id="password" placeholder="Enter admin password" required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <span>Sign In</span>
                <i class="bi bi-arrow-right"></i>
            </button>
        </form>

        <a href="/" class="back-link">
            <i class="bi bi-arrow-left"></i> Back to Homepage
        </a>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UI Loading state
            submitBtn.disabled = true;
            submitBtn.querySelector('span').innerText = 'Signing In...';
            errorMsg.style.display = 'none';

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Success -> redirect to admin portal
                    window.location.href = '/admin';
                } else {
                    // Display error message
                    errorText.innerText = data.detail || 'Login failed. Please try again.';
                    errorMsg.style.display = 'flex';
                }
            } catch (err) {
                errorText.innerText = 'Network error. Please try again later.';
                errorMsg.style.display = 'flex';
            } finally {
                submitBtn.disabled = false;
                submitBtn.querySelector('span').innerText = 'Sign In';
            }
        });
    </script>
</body>
</html>
